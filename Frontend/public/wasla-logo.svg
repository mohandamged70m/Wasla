<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
  <!-- Icon mark: two connected nodes (connection theme) -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00A884"/>
      <stop offset="100%" stop-color="#1DA1F2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#g)"/>

  <!-- Connection node 1 (top) -->
  <circle cx="16" cy="18" r="5" fill="white" opacity="0.95"/>
  <!-- Connection node 2 (bottom) -->
  <circle cx="32" cy="30" r="5" fill="white" opacity="0.95"/>
  <!-- Connecting line -->
  <line x1="19" y1="21" x2="29" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Small decorative dot -->
  <circle cx="24" cy="24" r="2.5" fill="white" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="58" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E" letter-spacing="-0.5">Wasla</text>
  <text x="58" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#00A884" letter-spacing="1.5" opacity="0.8">وصل أعمالك</text>
</svg>
